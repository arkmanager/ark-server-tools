name: ShellCheck

on:
  - push
  - pull_request

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
      with:
        severity: warning
      env:
        SHELLCHECK_OPTS: --norc --external-sources --source-path=SCRIPTDIR
